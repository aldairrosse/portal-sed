openapi: 3.1.0
info:
  title: SED Goals API
  version: '1.0.0'
  description: Core employee-facing API for goals, categories, KPIs, weight validation, and assignments.

servers:
  - url: /api/v1

paths:
  # ============================================================================
  # Categories
  # ============================================================================
  /employees/{empId}/categories:
    get:
      operationId: listCategories
      summary: List categories with nested goals
      parameters:
        - $ref: '#/components/parameters/EmpId'
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '429':
          $ref: '#/components/responses/RateLimit'
    post:
      operationId: createCategory
      summary: Create a goal category
      parameters:
        - $ref: '#/components/parameters/EmpId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Created category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/InvalidWeightRange'
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '409':
          $ref: '#/components/responses/DuplicateCategoryName'
        '429':
          $ref: '#/components/responses/RateLimit'

  /employees/{empId}/categories/{catId}:
    put:
      operationId: updateCategory
      summary: Update a goal category
      parameters:
        - $ref: '#/components/parameters/EmpId'
        - $ref: '#/components/parameters/CatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Updated category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/InvalidWeightRange'
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '404':
          $ref: '#/components/responses/CategoryNotFound'
        '409':
          $ref: '#/components/responses/DuplicateCategoryName'
    delete:
      operationId: deleteCategory
      summary: Delete a goal category
      parameters:
        - $ref: '#/components/parameters/EmpId'
        - $ref: '#/components/parameters/CatId'
      responses:
        '204':
          description: Category deleted
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '404':
          $ref: '#/components/responses/CategoryNotFound'

  # ============================================================================
  # Goals
  # ============================================================================
  /employees/{empId}/categories/{catId}/goals:
    post:
      operationId: createGoal
      summary: Create a goal in a category
      parameters:
        - $ref: '#/components/parameters/EmpId'
        - $ref: '#/components/parameters/CatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGoalRequest'
      responses:
        '201':
          description: Created goal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalResponse'
        '400':
          $ref: '#/components/responses/InvalidGoalRequest'
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '404':
          $ref: '#/components/responses/CategoryNotFound'
        '422':
          $ref: '#/components/responses/WeightInvalid'
        '429':
          $ref: '#/components/responses/RateLimit'

  /goals/{goalId}:
    put:
      operationId: updateGoal
      summary: Update a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGoalRequest'
      responses:
        '200':
          description: Updated goal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalResponse'
        '400':
          $ref: '#/components/responses/InvalidGoalRequest'
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '404':
          $ref: '#/components/responses/GoalNotFound'
        '409':
          $ref: '#/components/responses/ConcurrentModification'
        '422':
          $ref: '#/components/responses/WeightInvalid'
    delete:
      operationId: deleteGoal
      summary: Delete a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      responses:
        '204':
          description: Goal deleted
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '404':
          $ref: '#/components/responses/GoalNotFound'

  /goals/{goalId}/progress:
    patch:
      operationId: updateGoalProgress
      summary: Update goal progress (currentValue)
      parameters:
        - $ref: '#/components/parameters/GoalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
      responses:
        '200':
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '404':
          $ref: '#/components/responses/GoalNotFound'

  # ============================================================================
  # Batch
  # ============================================================================
  /goals/batch:
    post:
      operationId: batchGoals
      summary: Atomically create or update multiple goals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchGoalRequest'
      responses:
        '200':
          description: Batch processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchGoalResponse'
        '400':
          $ref: '#/components/responses/BatchSizeExceeded'
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '422':
          $ref: '#/components/responses/WeightInvalid'

  # ============================================================================
  # Weight Validation
  # ============================================================================
  /employees/{empId}/validate-weights:
    post:
      operationId: validateWeights
      summary: Validate Double 100% weight rule
      parameters:
        - $ref: '#/components/parameters/EmpId'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightValidationResponse'

  # ============================================================================
  # KPIs
  # ============================================================================
  /kpis:
    get:
      operationId: listKPIs
      summary: List all KPIs
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: KPI list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KpiListResponse'
    post:
      operationId: createKPI
      summary: Create a KPI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKpiRequest'
      responses:
        '201':
          description: Created KPI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KpiResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'

  /kpis/{kpiId}:
    put:
      operationId: updateKPI
      summary: Update a KPI
      parameters:
        - $ref: '#/components/parameters/KpiId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateKpiRequest'
      responses:
        '200':
          description: Updated KPI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KpiResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '404':
          $ref: '#/components/responses/KpiNotFound'
    delete:
      operationId: deleteKPI
      summary: Delete a KPI
      parameters:
        - $ref: '#/components/parameters/KpiId'
      responses:
        '204':
          description: KPI deleted
        '404':
          $ref: '#/components/responses/KpiNotFound'
        '409':
          $ref: '#/components/responses/KpiLinked'

  # ============================================================================
  # KPI Linking
  # ============================================================================
  /goals/{goalId}/kpis:
    post:
      operationId: linkKPI
      summary: Link a KPI to a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkKpiRequest'
      responses:
        '200':
          description: KPI linked to goal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalResponse'
        '400':
          $ref: '#/components/responses/KpiLinkLimitExceeded'
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '404':
          $ref: '#/components/responses/GoalNotFound'

  /goals/{goalId}/kpis/{kpiId}:
    delete:
      operationId: unlinkKPI
      summary: Unlink a KPI from a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
        - $ref: '#/components/parameters/KpiId'
      responses:
        '204':
          description: KPI unlinked
        '403':
          $ref: '#/components/responses/PhaseRestricted'
        '404':
          $ref: '#/components/responses/GoalNotFound'

  # ============================================================================
  # Assignments
  # ============================================================================
  /employees/{empId}/assignments:
    get:
      operationId: getAssignment
      summary: Get the employee's current goal assignment
      parameters:
        - $ref: '#/components/parameters/EmpId'
      responses:
        '200':
          description: Assignment data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '404':
          $ref: '#/components/responses/GoalNotFound'
    post:
      operationId: createAssignment
      summary: Create a goal assignment for the employee
      parameters:
        - $ref: '#/components/parameters/EmpId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssignmentRequest'
      responses:
        '201':
          description: Created assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '403':
          $ref: '#/components/responses/PhaseRestricted'

components:
  parameters:
    EmpId:
      name: empId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CatId:
      name: catId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    GoalId:
      name: goalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    KpiId:
      name: kpiId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        maximum: 100

  schemas:
    # ============================================================================
    # Error Schema
    # ============================================================================
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: string
            trace_id:
              type: string

    # ============================================================================
    # Category Schemas
    # ============================================================================
    CreateCategoryRequest:
      type: object
      required: [name, weight]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        weight:
          type: number
          minimum: 0.01
          maximum: 100

    UpdateCategoryRequest:
      type: object
      required: [name, weight]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        weight:
          type: number
          minimum: 0.01
          maximum: 100

    CategoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        weight:
          type: number
        goals:
          type: array
          items:
            $ref: '#/components/schemas/GoalResponse'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CategoryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CategoryResponse'
        next_cursor:
          type: string
          nullable: true

    # ============================================================================
    # Goal Schemas
    # ============================================================================
    CreateGoalRequest:
      type: object
      required: [name, unit, weight, target_value]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        unit:
          type: string
          enum: [porcentaje, moneda, numero]
        weight:
          type: number
          minimum: 0.01
          maximum: 100
        target_value:
          type: number
          minimum: 0.01
        kpi_ids:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 5

    UpdateGoalRequest:
      type: object
      required: [name, unit, weight, target_value, version]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        unit:
          type: string
          enum: [porcentaje, moneda, numero]
        weight:
          type: number
          minimum: 0.01
          maximum: 100
        target_value:
          type: number
          minimum: 0.01
        version:
          type: integer
          minimum: 1
        kpi_ids:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 5

    GoalResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        unit:
          type: string
        weight:
          type: number
        target_value:
          type: number
        current_value:
          type: number
        state:
          type: string
          enum: [borrador, fijada, en_seguimiento, evaluada, cerrada]
        version:
          type: integer
        kpis:
          type: array
          items:
            $ref: '#/components/schemas/KpiResponse'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateProgressRequest:
      type: object
      required: [current_value]
      properties:
        current_value:
          type: number
          minimum: 0

    # ============================================================================
    # Batch Schemas
    # ============================================================================
    BatchGoalItem:
      type: object
      required: [operation, goal]
      properties:
        operation:
          type: string
          enum: [create, update]
        category_id:
          type: string
          format: uuid
        goal_id:
          type: string
          format: uuid
        goal:
          $ref: '#/components/schemas/CreateGoalRequest'

    BatchGoalRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: '#/components/schemas/BatchGoalItem'

    BatchGoalResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GoalResponse'

    # ============================================================================
    # Weight Validation Schemas
    # ============================================================================
    WeightValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        category_sum:
          type: number
        expected_sum:
          type: number
        deficit:
          type: number
        goal_sums:
          type: array
          items:
            $ref: '#/components/schemas/CategoryGoalSum'

    CategoryGoalSum:
      type: object
      properties:
        category_id:
          type: string
          format: uuid
        category_name:
          type: string
        sum:
          type: number
        expected_sum:
          type: number
        deficit:
          type: number

    # ============================================================================
    # KPI Schemas
    # ============================================================================
    CreateKpiRequest:
      type: object
      required: [name, unit]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        unit:
          type: string
          enum: [porcentaje, moneda, numero]
        description:
          type: string

    UpdateKpiRequest:
      type: object
      required: [name, unit]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        unit:
          type: string
          enum: [porcentaje, moneda, numero]
        description:
          type: string

    KpiResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        unit:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    KpiListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/KpiResponse'
        next_cursor:
          type: string
          nullable: true

    LinkKpiRequest:
      type: object
      required: [kpi_id]
      properties:
        kpi_id:
          type: string
          format: uuid

    # ============================================================================
    # Assignment Schemas
    # ============================================================================
    AssignmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        cycle_id:
          type: string
          format: uuid
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryResponse'
        created_at:
          type: string
          format: date-time

    CreateAssignmentRequest:
      type: object
      required: [cycle_id]
      properties:
        cycle_id:
          type: string
          format: uuid

  # ============================================================================
  # Reusable Responses
  # ============================================================================
  responses:
    PhaseRestricted:
      description: Operation not allowed in current cycle phase
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    WeightInvalid:
      description: Weight validation failed (Double 100% rule)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    DuplicateCategoryName:
      description: Category name already exists for employee
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ConcurrentModification:
      description: Optimistic locking version mismatch
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    KpiLinked:
      description: KPI cannot be deleted because it is linked to goals
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimit:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InvalidWeightRange:
      description: Weight must be between 0 and 100
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InvalidRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    CategoryNotFound:
      description: Category not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    GoalNotFound:
      description: Goal not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    KpiNotFound:
      description: KPI not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InvalidGoalRequest:
      description: Invalid goal request (weight, target, unit, etc.)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BatchSizeExceeded:
      description: Batch size exceeds maximum allowed (50)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    KpiLinkLimitExceeded:
      description: A goal cannot have more than 5 linked KPIs
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
