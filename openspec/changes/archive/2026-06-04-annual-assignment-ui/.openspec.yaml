schema: spec-driven
created: 2026-06-03
status: proposed
change: A3 — annual-assignment-ui
description: >
  Pantalla de inicio de año: cada empleado (incluido RH) crea y edita metas
  anuales agrupadas en categorías custom (independientes de pilares), con doble
  ponderación 100% (categorías suman 100% y metas dentro de cada categoría
  suman 100%) y KPIs indicadores (numérico/porcentaje/moneda) vinculables a 1+
  metas. Jefes/directores/gerentes pueden ver y solicitar cambios (ajustar
  KPIs y ponderaciones) sin agregar ni borrar metas. UI-first con fixtures
  JSON, sin API ni persistencia.
